<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Monitor de Concentración</title>
  
  <!-- Fuentes de Google: Outfit para un diseño premium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- MediaPipe Models -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
  
  <!-- Three.js para el modelo 3D -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  
  <style>
    :root {
      /* Gradientes Premium */
      --bg-blue: linear-gradient(135deg, #091a28 0%, #183e5c 50%, #2b6a9c 100%);
      --bg-red: linear-gradient(135deg, #3d0202 0%, #8f0707 50%, #d31515 100%);
      --font-family: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: var(--font-family);
      background-color: #000;
    }

    #bg-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('Playa_rocosa.webp') center/cover no-repeat;
      z-index: 1;
    }

    #bg-red-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-red);
      z-index: 2;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    body.distracted #bg-red-layer {
      opacity: 1;
    }

    .output_canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 3;
      transform: scaleX(-1); /* Efecto espejo */
    }

    /* Canvas de Three.js para el bombillo */
    #three-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
      /* No aplicamos transform: scaleX(-1) aquí porque calcularemos las posiciones ya espejadas */
    }

    .input_video {
      display: none;
    }

    /* Capa de interfaz de usuario superpuesta */
    #ui-layer {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      color: white;
      text-align: center;
      pointer-events: none;
    }

    #status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 32px;
      border-radius: 40px;
      background: rgba(14, 46, 75, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: 2px;
      transition: all 0.4s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-transform: uppercase;
    }

    body.distracted #status-badge {
      background: rgba(211, 21, 21, 0.85);
      border-color: rgba(255, 100, 100, 0.6);
      box-shadow: 0 8px 32px rgba(211, 21, 21, 0.5);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(211, 21, 21, 0.7); }
      70% { transform: scale(1.08); box-shadow: 0 0 0 20px rgba(211, 21, 21, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(211, 21, 21, 0); }
    }

    /* Pantalla de carga premium */
    #loading {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #050a0f;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      transition: opacity 0.6s ease;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #3498db;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
      margin-bottom: 24px;
    }

    @keyframes spin { 
      100% { transform: rotate(360deg); } 
    }

    #loading-text {
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- Pantalla de carga -->
  <div id="loading">
    <div class="spinner"></div>
    <h2 id="loading-text">Iniciando Inteligencia Artificial...</h2>
  </div>

  <!-- Capas de fondo para transiciones fluidas de color -->
  <div id="bg-container"></div>
  <div id="bg-red-layer"></div>
  
  <!-- Interfaz de estado -->
  <div id="ui-layer">
    <div id="status-badge">CONCENTRADO</div>
  </div>

  <video class="input_video" autoplay playsinline></video>
  <canvas class="output_canvas"></canvas>
  <!-- Nuevo canvas para Three.js -->
  <canvas id="three-canvas"></canvas>

  <script>
    // Referencias a elementos del DOM
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d', { willReadFrequently: true });
    const threeCanvas = document.getElementById('three-canvas');
    const body = document.body;
    const loadingScreen = document.getElementById('loading');
    const loadingText = document.getElementById('loading-text');
    const statusBadge = document.getElementById('status-badge');

    // Variables de Three.js
    let scene, camera, renderer, lightbulb;
    let bulbLoaded = false;

    // Inicializar Three.js
    function initThree() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      
      renderer = new THREE.WebGLRenderer({
        canvas: threeCanvas,
        alpha: true,
        antialias: true
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      // Luces
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(5, 5, 5);
      scene.add(directionalLight);

      camera.position.z = 5;

      // Cargar el bombillo
      console.log("Iniciando carga de lightbulb.glb...");
      const loader = new THREE.GLTFLoader();
      loader.load('lightbulb.glb', (gltf) => {
        lightbulb = gltf.scene;
        lightbulb.scale.set(1.5, 1.5, 1.5);
        lightbulb.visible = false; 
        scene.add(lightbulb);
        bulbLoaded = true;
        console.log("¡Bombillo cargado con éxito!");
      }, (xhr) => {
        console.log((xhr.loaded / xhr.total * 100) + '% cargado');
      }, (error) => {
        console.error("Error crítico cargando el modelo 3D:", error);
        console.log("Asegúrate de estar usando Live Server (http://...) y no abriendo el archivo directamente (file://).");
      });

      window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Variables de estado
    let modelsLoaded = 0;
    const TOTAL_MODELS = 2;
    let distractionTimeout = null;
    const DISTRACTION_TOLERANCE_MS = 1000; 

    function onModelLoaded() {
      modelsLoaded++;
      if (modelsLoaded === TOTAL_MODELS) {
        startCamera();
      }
    }

    const locateFile = (file) => {
      if (file.includes('selfie_segmentation')) {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
      } else {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
      }
    };

    const faceMesh = new FaceMesh({ locateFile: locateFile });
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    faceMesh.onResults(onFaceResults);

    const selfieSegmentation = new SelfieSegmentation({ locateFile: locateFile });
    selfieSegmentation.setOptions({
      modelSelection: 1,
    });
    selfieSegmentation.onResults(onSegmentationResults);

    async function initModels() {
      try {
        initThree(); // Inicializar Three.js también
        await faceMesh.initialize();
        onModelLoaded();
        await selfieSegmentation.initialize();
        onModelLoaded();
      } catch (err) {
        loadingText.innerText = "Error cargando modelos. Recuerda usar Live Server.";
        console.error(err);
      }
    }
    
    initModels();

    function startCamera() {
      loadingText.innerText = "Accediendo a la cámara...";
      navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
      }).then(stream => {
        videoElement.srcObject = stream;
        videoElement.onloadedmetadata = () => {
          videoElement.play();
          canvasElement.width = videoElement.videoWidth;
          canvasElement.height = videoElement.videoHeight;
          onWindowResize();
          
          loadingScreen.style.opacity = '0';
          setTimeout(() => loadingScreen.style.display = 'none', 600);
          
          processVideo();
        };
      }).catch(err => {
        loadingText.innerText = "Por favor, concede permisos de cámara para continuar.";
        console.error("Error de cámara: ", err);
      });
    }

    let isProcessing = false;
    async function processVideo() {
      if (videoElement.readyState >= 2 && !isProcessing) {
        isProcessing = true;
        try {
          await selfieSegmentation.send({image: videoElement});
          await faceMesh.send({image: videoElement});
        } catch (e) {
          console.error(e);
        }
        isProcessing = false;
      }
      
      // Renderizar escena Three.js
      if (scene && camera) {
        renderer.render(scene, camera);
      }
      
      requestAnimationFrame(processVideo);
    }

    // --- Resultados de Segmentación ---
    function onSegmentationResults(results) {
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // Factores para encoger al usuario (0.7)
      const scale = 0.7;
      const w = canvasElement.width * scale;
      const h = canvasElement.height * scale;
      const x = (canvasElement.width - w) / 2;
      const y = canvasElement.height - h; // Pegado abajo para dejar aire arriba

      // Dibujar la máscara de la persona (escalada)
      canvasCtx.drawImage(results.segmentationMask, x, y, w, h);

      // Mantener solo los pixeles donde la máscara es blanca (la persona)
      canvasCtx.globalCompositeOperation = 'source-in';
      canvasCtx.drawImage(results.image, x, y, w, h);

      canvasCtx.restore();
    }

    function onFaceResults(results) {
      let isDistracted = false;

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const face = results.multiFaceLandmarks[0];
        
        // --- Lógica de Posicionamiento del Bombillo ---
        // Sincronizada con el escalado del usuario (0.7 y pegado abajo)
        const scale = 0.7;
        const nx = ((1 - face[10].x) * scale) + (1 - scale) / 2;
        const ny = (face[10].y * scale) + (1 - scale); 
        
        const aspect = window.innerWidth / window.innerHeight;
        const x3d = (nx * 2 - 1) * 3.5 * aspect;
        const y3d = (ny * -2 + 1) * 3.5;
        
        const faceSize = Math.hypot(face[10].x - face[152].x, face[10].y - face[152].y) * scale;
        const faceScale = faceSize * 3;

        // --- Lógica de Atención ---
        const noseTip = face[1];
        const leftCheek = face[234];
        const rightCheek = face[454];
        const topOfHead = face[10];
        const bottomOfChin = face[152];

        const distLeftToNose = Math.hypot(noseTip.x - leftCheek.x, noseTip.y - leftCheek.y, noseTip.z - leftCheek.z);
        const distRightToNose = Math.hypot(rightCheek.x - noseTip.x, rightCheek.y - noseTip.y, rightCheek.z - noseTip.z);
        const yawRatio = distLeftToNose / distRightToNose;

        if (yawRatio > 1.8 || yawRatio < 0.55) isDistracted = true;

        const distNoseToTop = Math.hypot(topOfHead.x - noseTip.x, topOfHead.y - noseTip.y, topOfHead.z - noseTip.z);
        const distNoseToBottom = Math.hypot(bottomOfChin.x - noseTip.x, bottomOfChin.y - noseTip.y, bottomOfChin.z - noseTip.z);
        const pitchRatio = distNoseToTop / distNoseToBottom;

        if (pitchRatio > 2.0 || pitchRatio < 0.75) isDistracted = true;

        // --- Aplicar Posición y Visibilidad Instantánea ---
        const targetBulb = lightbulb || scene.getObjectByName('fallbackBulb');
        if (!targetBulb && !bulbLoaded && scene) {
            // Re-crear fallback si se perdió
            const group = new THREE.Group();
            group.name = 'fallbackBulb';
            const bulbGeom = new THREE.SphereGeometry(0.5, 16, 16);
            const bulbMat = new THREE.MeshPhongMaterial({ color: 0xffff00, emissive: 0xffff00, emissiveIntensity: 0.8 });
            group.add(new THREE.Mesh(bulbGeom, bulbMat));
            const baseGeom = new THREE.CylinderGeometry(0.2, 0.2, 0.3, 12);
            const base = new THREE.Mesh(baseGeom, new THREE.MeshPhongMaterial({ color: 0x888888 }));
            base.position.y = -0.5;
            group.add(base);
            scene.add(group);
        }

        const finalBulb = lightbulb || scene.getObjectByName('fallbackBulb');
        if (finalBulb) {
          finalBulb.scale.set(faceScale, faceScale, faceScale);
          finalBulb.position.set(x3d, y3d + (faceScale * 1.5), -face[10].z * 5);
          finalBulb.rotation.y += 0.05;
          // DESAPARECE INSTANTÁNEAMENTE si isDistracted es true
          finalBulb.visible = !isDistracted;
        }
      } else {
        // No hay rostro detectado: Distraído y ocultar bombillo
        isDistracted = true;
        const targetBulb = lightbulb || scene.getObjectByName('fallbackBulb');
        if (targetBulb) targetBulb.visible = false;
      }

      handleAttentionState(isDistracted);
    }

    function handleAttentionState(isDistracted) {
      if (isDistracted) {
        if (!body.classList.contains('distracted') && distractionTimeout === null) {
          distractionTimeout = setTimeout(() => {
            body.classList.add('distracted');
            statusBadge.innerText = "¡CONCÉNTRATE!";
          }, DISTRACTION_TOLERANCE_MS);
        }
      } else {
        if (distractionTimeout !== null) {
          clearTimeout(distractionTimeout);
          distractionTimeout = null;
        }
        
        if (body.classList.contains('distracted')) {
          body.classList.remove('distracted');
          statusBadge.innerText = "CONCENTRADO";
        }
      }
    }

  </script>
</body>
</html>
